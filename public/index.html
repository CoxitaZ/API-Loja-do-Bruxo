<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Loja do Feiticeiro — Itens</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="container">
    <h1>🧙 Loja do Feiticeiro — Itens</h1>
    <div class="filters">
      <input id="searchInput" type="search" placeholder="Buscar por nome..." />
      <input id="categoryInput" type="text" placeholder="Filtrar por categoria..." />
      <button id="filterBtn">Filtrar</button>
      <button id="resetBtn" class="secondary">Limpar</button>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <div class="card-header">
        <h2>Itens</h2>
        <button id="openCreateBtn">+ Novo item</button>
      </div>

      <div id="tableContainer" class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Nome</th>
              <th>Categoria</th>
              <th>Preço</th>
              <th>Estoque</th>
              <th>Criado</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="itemsTbody">
            <tr><td colspan="7">Carregando...</td></tr>
          </tbody>
        </table>
      </div>

      <div class="pagination">
        <button id="prevPageBtn" class="secondary">Anterior</button>
        <span id="pageInfo"></span>
        <button id="nextPageBtn" class="secondary">Próxima</button>
      </div>
    </section>
  </main>

  <!-- Modal de Criação/Edição -->
  <dialog id="itemModal">
    <form id="itemForm" method="dialog">
      <h3 id="modalTitle">Novo item</h3>

      <input type="hidden" id="itemId" />
      <div class="grid">
        <div class="field">
          <label for="nome">Nome *</label>
          <input id="nome" required minlength="2" />
        </div>
        <div class="field">
          <label for="categoria">Categoria</label>
          <input id="categoria" />
        </div>
        <div class="field">
          <label for="preco">Preço *</label>
          <input id="preco" type="number" step="0.01" min="0" required />
        </div>
        <div class="field">
          <label for="estoque">Estoque *</label>
          <input id="estoque" type="number" step="1" min="0" required />
        </div>
        <div class="field field-col">
          <label for="descricao">Descrição</label>
          <textarea id="descricao" rows="3"></textarea>
        </div>
      </div>

      <div class="modal-actions">
        <button type="submit" id="saveBtn">Salvar</button>
        <button type="button" id="cancelBtn" class="secondary">Cancelar</button>
      </div>
      <p id="formError" class="error"></p>
    </form>
  </dialog>

  <!-- Toast -->
  <div id="toast" class="toast" hidden></div>

  <script>
    window.API_BASE_URL = "http://localhost:3000";
  </script>
  <script src="./app.js"></script>
</body>
</html>
